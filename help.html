<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">

<title>עזרים ומדריכים</title>

<meta name="viewport" content="initial-scale=0.35">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">


<style>

/* ===== אותו דבר כמו INDEX ===== */

body{
font-family:Varela Round;
text-align:center;

background:url(https://i.ibb.co/nMmWgCMg/atar.png);
background-repeat:repeat;
animation:bg 20s linear infinite;
}

@keyframes bg{
from{background-position:0 0}
to{background-position:500px 0}
}

.main{
background:white;
width:600px;
margin:auto;
padding:20px;
}

h1{
font-family:Gveret Levin;
color:#00a9ff;
}

#kipo{
animation: shake 3s infinite;
}

#kipo:hover{
animation: shake 0.4s infinite;
}

@keyframes shake{

0%{transform:translate(0,0) rotate(0deg)}
10%{transform:translate(-2px,2px) rotate(-2deg)}
20%{transform:translate(2px,-2px) rotate(2deg)}
30%{transform:translate(-2px,2px) rotate(-2deg)}
40%{transform:translate(2px,-2px) rotate(2deg)}
50%{transform:translate(-2px,2px) rotate(-2deg)}
60%{transform:translate(2px,-2px) rotate(2deg)}
70%{transform:translate(-2px,2px) rotate(-1deg)}
80%{transform:translate(2px,-2px) rotate(1deg)}
90%{transform:translate(-1px,1px) rotate(0deg)}
100%{transform:translate(0,0) rotate(0deg)}

}

.menu{
margin:10px;
padding:10px;
background:#dff2ff;
border-radius:12px;

display:flex;
justify-content:center;
gap:2px;
flex-wrap:wrap;
}

.menu button{
background:#00a9ff;
color:white;
border:none;
padding:15px;
margin:5px;
cursor:pointer;
font-family:'Varela Round', sans-serif;
font-size:20px;
border-radius:8px;
transition:0.2s;
}

.menu button:hover{
background:#9eddff;
transform:scale(1.05);
}

</style>

</head>



<body>

<div class="main">

<img id="kipo" src="https://i.ibb.co/XwCp4rC/Kipo.png" width="300">

<h1>
קיפו - מערכת חינמית לבניית אתרים לילדים
</h1>



<div class="menu">

<button onclick="location.href='index.html'">
דף הבית
</button>

<button onclick="location.href='about.html'">
אודות קיפו
</button>

<button onclick="location.href='help.html'">
עזרים ומדריכים לאתר האישי
</button>

</div>



<h2>
עזרים ומדריכים לאתר האישי
</h2>


<div id="content"></div>


</div>



<script>

if(localStorage.getItem("admin")=="yes"){

let b=document.createElement("button");

b.innerText="ערוך עמוד";

b.style.position="fixed";
b.style.bottom="10px";
b.style.left="10px";

b.onclick=function(){
location.href="help_editor.html";
};

document.body.appendChild(b);

}

</script>



<script type="module">

import {
db,
doc,
getDoc
} from "./firebase.js";

async function load(){

let snap = await getDoc(
doc(db,"pages","help")
);

if(snap.exists()){

document.getElementById("content").innerHTML =
snap.data().html;

}

}

load();

</script>




<script>
window.addEventListener("load", () => {

  const isAdmin = localStorage.getItem("admin");

  if (isAdmin === "yes") {

    const btn = document.createElement("button");

    btn.innerText = "ערוך עמוד";
    btn.style.position = "fixed";
    btn.style.bottom = "20px";
    btn.style.left = "20px";
    btn.style.zIndex = "9999";
    btn.style.padding = "10px 20px";
    btn.style.borderRadius = "10px";
    btn.style.border = "none";
    btn.style.background = "#4da3ff";
    btn.style.color = "white";
    btn.style.cursor = "pointer";

    btn.onclick = () => {
      window.location.href = "help_editor.html";
    };

    document.body.appendChild(btn);

  }

});
</script>







  
</body>
</html>
