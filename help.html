<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">

<title>עזרים ומדריכים לאתר האישי</title>

<meta name="viewport" content="initial-scale=0.35">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">


<style>

body{
font-family:Varela Round;
text-align:center;

background:url(https://i.ibb.co/nMmWgCMg/atar.png);
background-repeat:repeat;
animation:bg 20s linear infinite;
}

@keyframes bg{
from{background-position:0 0}
to{background-position:500px 0}
}

.main{
background:white;
width:600px;
margin:auto;
padding:20px;
}

h1{
font-family:Gveret Levin;
color:#00a9ff;
}

button{
background:#00a9ff;
color:white;
border:none;
padding:10px;
margin:5px;
cursor:pointer;
font-family:'Varela Round', sans-serif;
}

#kipo{
animation: shake 3s infinite;
}

#kipo:hover{
animation: shake 0.4s infinite;
}

@keyframes shake{

0%{transform:translate(0,0) rotate(0deg)}
10%{transform:translate(-2px,2px) rotate(-2deg)}
20%{transform:translate(2px,-2px) rotate(2deg)}
30%{transform:translate(-2px,2px) rotate(-2deg)}
40%{transform:translate(2px,-2px) rotate(2deg)}
50%{transform:translate(-2px,2px) rotate(-2deg)}
60%{transform:translate(2px,-2px) rotate(2deg)}
70%{transform:translate(-2px,2px) rotate(-1deg)}
80%{transform:translate(2px,-2px) rotate(1deg)}
90%{transform:translate(-1px,1px) rotate(0deg)}
100%{transform:translate(0,0) rotate(0deg)}

}

.menu{
margin:10px;
padding:10px;
background:#dff2ff;
border-radius:12px;

display:flex;
justify-content:center;
gap:2px;
flex-wrap:wrap;
}

.menu button{
background:#00a9ff;
color:white;
border:none;
padding:15px;
cursor:pointer;
font-family:'Varela Round', sans-serif;
font-size:20px;
border-radius:8px;
transition:0.2s;
}

.menu button:hover{
background:#0086cc;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="main">

<img id="kipo" src="https://i.ibb.co/XwCp4rC/Kipo.png" width="300">

<h1>
קיפו - מערכת חינמית לבניית אתרים לילדים
</h1>


<div class="menu">

<button onclick="location.href='index.html'">דף הבית</button>
<button onclick="location.href='about.html'">אודות קיפו</button>
<button onclick="location.href='help.html'">עזרים ומדריכים לאתר האישי</button>

</div>


<h2>עזרים</h2>

<p>
כאן תוסיף מדריכים
</p>

</div>

</body>
</html>
