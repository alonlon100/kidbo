<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">

<title>עזרים ומדריכים לאתר האישי</title>

<meta name="viewport" content="initial-scale=0.35">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">


<style>

/* ===== אותו דבר כמו INDEX ===== */

body{
font-family:Varela Round;
text-align:center;

background:url(https://i.ibb.co/nMmWgCMg/atar.png);
background-repeat:repeat;
animation:bg 20s linear infinite;
}

@keyframes bg{
from{background-position:0 0}
to{background-position:500px 0}
}

.main{
background:white;
width:600px;
margin:auto;
padding:20px;
}

h1{
font-family:Gveret Levin;
color:#00a9ff;
}

#kipo{
animation: shake 3s infinite;
}

#kipo:hover{
animation: shake 0.4s infinite;
}

@keyframes shake{

0%{transform:translate(0,0) rotate(0deg)}
10%{transform:translate(-2px,2px) rotate(-2deg)}
20%{transform:translate(2px,-2px) rotate(2deg)}
30%{transform:translate(-2px,2px) rotate(-2deg)}
40%{transform:translate(2px,-2px) rotate(2deg)}
50%{transform:translate(-2px,2px) rotate(-2deg)}
60%{transform:translate(2px,-2px) rotate(2deg)}
70%{transform:translate(-2px,2px) rotate(-1deg)}
80%{transform:translate(2px,-2px) rotate(1deg)}
90%{transform:translate(-1px,1px) rotate(0deg)}
100%{transform:translate(0,0) rotate(0deg)}

}

.menu{
margin:10px;
padding:10px;
background:#dff2ff;
border-radius:12px;

display:flex;
justify-content:center;
gap:2px;
flex-wrap:wrap;
}

.menu button{
background:#00a9ff;
color:white;
border:none;
padding:15px;
margin:5px;
cursor:pointer;
font-family:'Varela Round', sans-serif;
font-size:20px;
border-radius:8px;
transition:0.2s;
}

.menu button:hover{
background:#9eddff;
transform:scale(1.05);
}

</style>



<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  

</head>



<body>

<div class="main">

<img id="kipo" src="https://i.ibb.co/XwCp4rC/Kipo.png" width="300">

<h1>
קיפו - מערכת חינמית לבניית אתרים לילדים
</h1>



<div class="menu">

<button onclick="location.href='index.html'">
דף הבית
</button>

<button onclick="location.href='about.html'">
אודות קיפו
</button>

<button onclick="location.href='help.html'">
עזרים ומדריכים לאתר האישי
</button>

</div>



<h2>
עזרים ומדריכים לאתר האישי
</h2>

<div id="adminEditWrap" style="display:none; margin:20px 0;">
  <button id="editBtn" class="menuBtn">
    ערוך עמוד
  </button>
</div>



  

<div id="content"></div>


</div>






<script type="module">

import {
db,
doc,
getDoc
} from "./firebase.js";

async function load(){

let snap = await getDoc(
doc(db,"pages","help")
);

if(snap.exists()){

document.getElementById("content").innerHTML =
snap.data().html;

}

}

load();

</script>








<script>
window.addEventListener("load", () => {

  const isAdmin = localStorage.getItem("admin");

  const wrap = document.getElementById("adminEditWrap");
  const btn = document.getElementById("editBtn");
  const content = document.getElementById("content");

  if (isAdmin === "yes") {

    wrap.style.display = "block";

    btn.onclick = () => {

      const html = content.innerHTML;

      content.innerHTML = `

        <div id="toolbar">
          <button class="ql-bold"></button>
          <button class="ql-italic"></button>
          <button class="ql-underline"></button>

          <select class="ql-color"></select>
          <select class="ql-background"></select>

          <button class="ql-image"></button>
        </div>

        <div id="editor" style="height:300px"></div>

        <br>
        <button id="saveBtn">שמור</button>

      `;

      const quill = new Quill("#editor", {
        theme: "snow",
        modules: { toolbar: "#toolbar" }
      });

      quill.root.innerHTML = html;

      document.getElementById("saveBtn").onclick =
      async () => {

        const mod = await import("./firebase.js");

        await mod.setDoc(
          mod.doc(mod.db,"pages","help"),
          { html: quill.root.innerHTML }
        );

        alert("נשמר");

      };

    };

  }

});
</script>



  



  
</body>
</html>
