<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>

<meta charset="UTF-8">

<title>אתר</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">

<script type="module" src="firebase.js"></script>

<style>

body{
margin:0;
font-family:Varela Round;
background:white;
}

body::before{
display:none;
}

.side{
position:fixed;
top:0;
bottom:0;
width:200px;
background-size:200px;
background-repeat:repeat;
z-index:-1;
}

#left{left:0;}
#right{right:0;}

.main{
width:700px;
margin:auto;
background:white;
min-height:100vh;
padding:20px;
}

h1{
font-family:Gveret Levin;
color:black;
}

button{
background:black;
color:white;
border:none;
padding:10px;
margin:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="left" class="side"></div>
<div id="right" class="side"></div>

<div class="main">

<button onclick="home()">דף הבית</button>

<h1 id="title"></h1>

<div id="author"></div>

<div id="content"></div>

<hr>

תגובות<br>

<input id="comment">
<button onclick="addComment()">שלח</button>

<div id="comments"></div>

<br>

<button onclick="back()">חזרה לעורך</button>

</div>


<script type="module">

import {
db,
doc,
getDoc,
setDoc,
collection,
getDocs,
deleteDoc
} from "./firebase.js";


let params = new URLSearchParams(location.search);
let user = params.get("u");

if(!user){
location="index.html";
}

const ref = doc(db,"sites",user);


async function load(){

let snap = await getDoc(ref);

if(!snap.exists()) return;

let data = snap.data();

title.innerText = data.name;

author.innerText = "נבנה על ידי: " + user;

content.innerHTML = data.html;

left.style.backgroundImage = "url("+data.bg+")";
right.style.backgroundImage = "url("+data.bg+")";

loadComments();

}

load();



const comRef = collection(db,"comments",user,"list");


async function loadComments(){

comments.innerHTML="";

let q = await getDocs(comRef);

q.forEach(d=>{

let div = document.createElement("div");

div.innerText = d.data().text;


if(localStorage.getItem("user") == user){

let del = document.createElement("button");

del.innerText="מחק";

del.onclick = async function(){

await deleteDoc(doc(comRef,d.id));

loadComments();

};

div.appendChild(del);

}

comments.appendChild(div);

});

}



window.addComment = async function(){

if(!comment.value) return;

await setDoc(
doc(comRef,Date.now().toString()),
{
text:comment.value
}
);

comment.value="";

loadComments();

};



window.back = function(){

if(localStorage.getItem("user")==user){
location="editor.html";
}

};



window.home = function(){

location="index.html";

};

</script>

</body>
</html>
