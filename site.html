<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">

<title>האתר</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="firebase.js"></script>

</head>

<body>

<div id="site"></div>

<script type="module">

import {
db,
doc,
getDoc
} from "./firebase.js";

const ref = doc(db, "site", "main");

async function load() {

const snap = await getDoc(ref);

if (snap.exists()) {

let data = snap.data();

site.innerHTML =
"<div style='background:url(" + data.bg + ")'>" +
"<h1>" + data.name + "</h1>" +
data.html +
"</div>";

}

}

load();

</script>

</body>
</html>
