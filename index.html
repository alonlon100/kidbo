<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">

<title>קידבו</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">

<script type="module" src="firebase.js"></script>

<style>

body{

font-family:Varela Round;
text-align:center;

background:url(https://i.ibb.co/nMmWgCMg/atar.png);
background-repeat:repeat;
animation:bg 20s linear infinite;

}

@keyframes bg{

from{background-position:0 0}
to{background-position:500px 0}

}

.main{

background:white;
width:600px;
margin:auto;
padding:20px;

}

h1{

font-family:Gveret Levin;
color:#00a9ff;

}

button{

background:#00a9ff;
color:white;
border:none;
padding:10px;
margin:5px;
cursor:pointer;

}

.box{

border:1px solid #ccc;
padding:10px;
margin:10px;

}

</style>

</head>

<body>

<div class="main">

<img src="https://i.ibb.co/pjg57JfN/logo-2.png" width="200">

<h1>
קידבו - מערכת חינמית לבניית אתרים לילדים
</h1>


<div class="box">

הרשמה

<br>

<input id="regUser" placeholder="שם משתמש">

<br>

<input id="regPass" placeholder="סיסמה">

<br>

<button onclick="register()">
הרשמה
</button>

</div>



<div class="box">

התחברות

<br>

<input id="logUser">

<br>

<input id="logPass">

<br>

<button onclick="login()">
התחברות
</button>

</div>



<div class="box">

אתרים שנבנו

<div id="sites"></div>

</div>


<div class="box">

התחברות הנהלה

<br>

<input id="adminPass">

<button onclick="adminLogin()">
כניסה
</button>

<button onclick="logout()">
ניתוק
</button>

</div>

</div>



<script type="module">

import {

db,
doc,
setDoc,
getDoc,
collection,
getDocs,
deleteDoc

} from "./firebase.js";



window.register = async function(){

let u=regUser.value;
let p=regPass.value;

await setDoc(
doc(db,"users",u),
{password:p}
);

alert("נרשמת");

localStorage.user=u;

location="editor.html";

};



window.login = async function(){

let u=logUser.value;
let p=logPass.value;

let snap =
await getDoc(doc(db,"users",u));

if(!snap.exists()) return;

if(snap.data().password!=p) return;

localStorage.user=u;

location="editor.html";

};



window.adminLogin=function(){

if(adminPass.value=="אלון666"){

localStorage.admin="yes";

alert("מנהל");

loadSites();

}

};



window.logout=function(){

localStorage.clear();

location.reload();

};



async function loadSites(){

sites.innerHTML="";

let q = await getDocs(
collection(db,"sites")
);

q.forEach(d=>{

let div=document.createElement("div");

let u=d.id;

div.innerHTML=

d.data().name+

" <button>כניסה</button>";

div.querySelector("button")
.onclick=()=>{

location=
"site.html?u="+u;

};

if(localStorage.admin){

let del=document.createElement("button");

del.innerText="מחק";

del.onclick=async()=>{

await deleteDoc(
doc(db,"sites",u)
);

await deleteDoc(
doc(db,"users",u)
);

loadSites();

};

div.appendChild(del);

}

sites.appendChild(div);

});

}

loadSites();

</script>

</body>

</html>
