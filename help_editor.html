<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">
<title>עריכת help</title>

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script type="module" src="firebase.js"></script>

<style>

body{
font-family:Varela Round;
background:#f0f0f0;
text-align:center;
}

.main{
background:white;
width:700px;
margin:auto;
padding:20px;
border-radius:10px;
}

#editor{
height:300px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>


<div class="main">

<h2>עורך עמוד עזרים</h2>


<div id="toolbar">

<span class="ql-formats">

<select class="ql-font"></select>

<select class="ql-size"></select>

</span>


<span class="ql-formats">

<button class="ql-bold"></button>
<button class="ql-italic"></button>
<button class="ql-underline"></button>

</span>


<span class="ql-formats">

<select class="ql-color"></select>
<select class="ql-background"></select>

</span>


<span class="ql-formats">

<button class="ql-image"></button>

</span>

</div>


<div id="editor"></div>


<br>

<button onclick="save()">שמור</button>


</div>



<script type="module">

import {
db,
doc,
setDoc,
getDoc
} from "./firebase.js";


let admin = localStorage.getItem("admin");

if(admin !== "yes"){
location = "index.html";
}



let quill = new Quill("#editor",{
theme:"snow",
modules:{ toolbar:"#toolbar" }
});


const ref = doc(db,"pages","help");


window.save = async function(){

await setDoc(ref,{
html:quill.root.innerHTML
});

alert("נשמר");

};


async function load(){

let snap = await getDoc(ref);

if(snap.exists()){

quill.root.innerHTML=snap.data().html;

}

}

load();

</script>


</body>
</html>
