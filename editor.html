<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>

<meta charset="UTF-8">

<title>עורך</title>

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">

<style>

body{
font-family:Varela Round;
background:#f0f0f0;
text-align:center;
}

.top{
background:white;
padding:10px;
}

.editor{
background:white;
width:800px;
margin:auto;
padding:10px;
min-height:300px;
border:1px solid #ccc;
}

button{
margin:5px;
}

</style>

</head>

<body>

<div class="top">

שם אתר
<br>
<input id="name">

<br><br>

פונט
<br>

<select id="font">

<option value="Varela Round">Varela Round</option>
<option value="Arial">Arial</option>
<option value="David">David</option>
<option value="Courier New">Courier</option>
<option value="Gveret Levin">Gveret Levin</option>

</select>

<br>

צבע
<br>

<input type="color" id="color">

<br><br>

רקע

<br>

<select id="bg">

<option value="https://i.ibb.co/0yqG7wH/bg1.png">1</option>
<option value="https://i.ibb.co/tq0Q5kK/bg2.png">2</option>
<option value="https://i.ibb.co/7Qpks9m/bg3.png">3</option>
<option value="https://i.ibb.co/5k5Wz9g/bg4.png">4</option>

</select>

<br><br>

<button onclick="save()">
שמור
</button>

<button onclick="logout()">
התנתק
</button>

<button onclick="delUser()">
מחק משתמש
</button>

</div>


<div
contenteditable
id="editor"
class="editor"
>
כתוב כאן
</div>



<script type="module">

import {
db,
doc,
setDoc,
getDoc,
deleteDoc
} from "./firebase.js?v=2";


let user = localStorage.getItem("user");

if(!user){
location.href="index.html";
}



window.save = async function(){

let name = nameInput.value;
let font = fontSelect.value;
let color = colorInput.value;
let bg = bgSelect.value;

await setDoc(
doc(db,"sites",user),
{
html: editor.innerHTML,
name:name,
font:font,
color:color,
bg:bg
}
);

alert("נשמר");

};



window.logout=function(){

localStorage.clear();
location.href="index.html";

};



window.delUser = async function(){

await deleteDoc(doc(db,"sites",user));
await deleteDoc(doc(db,"users",user));

localStorage.clear();

location.href="index.html";

};



let nameInput = document.getElementById("name");
let fontSelect = document.getElementById("font");
let colorInput = document.getElementById("color");
let bgSelect = document.getElementById("bg");

</script>

</body>
</html>
