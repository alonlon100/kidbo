<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>

<meta charset="UTF-8">
<title>עורך האתר</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Gveret+Levin&display=swap" rel="stylesheet">

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script type="module" src="firebase.js"></script>

<style>

body{font-family:Varela Round;text-align:center;}

.main{background:white;width:700px;margin:auto;padding:20px;}

#bgSelect img{width:80px;margin:5px;cursor:pointer;border:3px solid transparent;}
#bgSelect img:hover{border:3px solid #00a9ff;}

.ql-font-VarelaRound{font-family:"Varela Round";}
.ql-font-GveretLevin{font-family:"Gveret Levin";}

</style>

</head>
<body>

<div class="main">

<h2 style="font-family:Gveret Levin;color:#00a9ff">
עורך האתר
</h2>

שם האתר<br>
<input id="siteName">

<br><br>

בחירת רקע
<div id="bgSelect"></div>

<br>

<div id="editor" style="height:300px"></div>

<br>

<button onclick="save()">שמירה</button>
<button onclick="openSite()">מעבר לאתר</button>
<button onclick="logout()">התנתקות</button>
<button onclick="deleteUser()">מחיקת משתמש והאתר</button>

</div>


<script type="module">

import {db,doc,setDoc,getDoc,deleteDoc} from "./firebase.js?v=2";

let user=localStorage.user;
if(!user)location="index.html";


let Font=Quill.import("formats/font");

Font.whitelist=["VarelaRound","GveretLevin","serif","sans-serif"];

Quill.register(Font,true);


let Size=Quill.import("attributors/style/size");

Size.whitelist=["8px","10px","12px","14px","16px","18px","24px","32px","48px","60px","72px"];

Quill.register(Size,true);


let quill=new Quill("#editor",{

theme:"snow",

modules:{
toolbar:[

[{font:[
{label:"Varela Round",value:"VarelaRound"},
{label:"Gveret Levin",value:"GveretLevin"},
"serif","sans-serif"
]}],

[{size:["8px","10px","12px","14px","16px","18px","24px","32px","48px","60px","72px"]}],

["bold","italic","underline"],
[{color:[]}],
[{align:[]}],
["image"]

]
}

});


let bgs=[
"https://i.ibb.co/4wXF4Jh5/514971w649bnc4h7.gif",
"https://i.ibb.co/xKSFXQ6p/1028701nidgo5cnnh.gif",
"https://i.ibb.co/GQRtGjbP/1301959bqir6wvcvv.gif",
"https://i.ibb.co/VpWKtQ9z/1254492hl9oznlwgq.gif",
"https://i.ibb.co/v4YFzCGH/1253900io7iftppfb.gif"
];

let bg="";

bgs.forEach(u=>{
let img=document.createElement("img");
img.src=u;
img.onclick=()=>bg=u;
bgSelect.appendChild(img);
});


const ref=doc(db,"sites",user);


window.save=async function(){

await setDoc(ref,{
name:siteName.value,
html:quill.root.innerHTML,
bg:bg
});

alert("נשמר");

};


async function load(){

let snap=await getDoc(ref);

if(snap.exists()){

siteName.value=snap.data().name;
quill.root.innerHTML=snap.data().html;
bg=snap.data().bg;

}

}

load();


window.openSite=()=>location="site.html?u="+user;

window.logout=()=>{
localStorage.removeItem("user");
location="index.html";
};

window.deleteUser=async()=>{

await deleteDoc(doc(db,"users",user));
await deleteDoc(doc(db,"sites",user));

localStorage.removeItem("user");
location="index.html";

};

</script>

</body>
</html>
